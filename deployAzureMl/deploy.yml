name: Build & Deploy ONNX .NET API

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Wersja modelu do zarejestrowania'
        default: '1'

env:
  ACR_NAME: ${{ vars.ACR_NAME }}                 # np. acronnxinference123
  IMAGE_NAME: onnx-dotnet-api
  DOTNET_PROJECT_PATH: ./dotnet-api
  INFRA_PATH: ./infra

jobs:
  # ────────────────────────────────────────────
  # 1. Build & Push obrazu Docker do ACR
  # ────────────────────────────────────────────
  build-and-push:
    name: Build .NET image → ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & Push do ACR (bez Docker daemon)
        id: meta
        run: |
          TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.DOTNET_PROJECT_PATH }}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────
  # 2. Upload modelu ONNX do datastore
  # ────────────────────────────────────────────
  upload-model:
    name: Upload model.onnx → Azure ML Datastore
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI extension
        run: az extension add -n ml --yes

      - name: Upload model.onnx do workspaceblobstore
        run: |
          az ml datastore upload \
            --name workspaceblobstore \
            --src-dir . \
            --target-path models/${{ vars.MODEL_NAME }}/${{ github.event.inputs.model_version || '1' }}/ \
            --workspace-name ${{ vars.WORKSPACE_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }}
        # Uwaga: model.onnx musi być w repozytorium lub pobrany z artefaktu

  # ────────────────────────────────────────────
  # 3. OpenTofu Apply — infrastruktura
  # ────────────────────────────────────────────
  deploy-infra:
    name: OpenTofu Apply
    runs-on: ubuntu-latest
    needs: [build-and-push, upload-model]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Tofu Init
        working-directory: ${{ env.INFRA_PATH }}
        run: tofu init

      - name: Tofu Plan
        working-directory: ${{ env.INFRA_PATH }}
        run: |
          tofu plan \
            -var="container_image=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="subscription_id=${{ vars.SUBSCRIPTION_ID }}" \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
            -var="workspace_name=${{ vars.WORKSPACE_NAME }}" \
            -var="acr_name=${{ env.ACR_NAME }}" \
            -out=tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ vars.SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.TENANT_ID }}
          ARM_CLIENT_ID: ${{ vars.CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Tofu Apply
        working-directory: ${{ env.INFRA_PATH }}
        run: tofu apply -auto-approve tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ vars.SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.TENANT_ID }}
          ARM_CLIENT_ID: ${{ vars.CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Wyświetl URL endpointu
        working-directory: ${{ env.INFRA_PATH }}
        run: |
          echo "### Endpoint URL" >> $GITHUB_STEP_SUMMARY
          tofu output endpoint_url >> $GITHUB_STEP_SUMMARY
        env:
          ARM_SUBSCRIPTION_ID: ${{ vars.SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.TENANT_ID }}
          ARM_CLIENT_ID: ${{ vars.CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
